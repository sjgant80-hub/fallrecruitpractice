<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>◊ FallRecruitPractice · sovereign UK recruitment agency practice management · placements · fees · AWR · payroll · P&L</title>
<meta name="description" content="Sovereign practice management for UK recruitment agencies. Placements, perm fees, temp margins, AWR tracking, payroll, invoicing, compliance, agency P&L. Single HTML, IDB primary, MIT.">
<meta name="prime" content="997">
<meta name="theme-color" content="#0b0a0f">
<link rel="manifest" href='data:application/manifest+json,{"name":"FallRecruitPractice","short_name":"recruit-practice","start_url":"./","display":"standalone","background_color":"%230b0a0f","theme_color":"%23b8974a","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect width=%27192%27 height=%27192%27 fill=%27%230b0a0f%27 rx=%2728%27/><text x=%2796%27 y=%27140%27 font-family=%27Georgia, serif%27 font-size=%27122%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27%23b8974a%27>%E2%97%8A</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:13px}input:focus,textarea:focus,select:focus{border-color:var(--brass)}a{color:var(--brass)}
.app{min-height:100dvh;display:grid;grid-template-rows:48px 1fr}header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}.brand .mark{width:28px;height:28px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--void)}.brand .name{font-family:var(--serif);font-weight:600;font-size:14px}.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}nav.tabs button{padding:0 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent}nav.tabs button:hover{background:var(--ink);color:var(--cream)}nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--brass)}
.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
main{padding:18px 22px 60px;overflow-y:auto;max-width:1200px;margin:0 auto;width:100%}
.disclaimer{background:rgba(139,26,26,0.15);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px}.disclaimer strong{color:var(--brass)}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600}.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}.section-h .actions{display:flex;gap:6px}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px;margin-bottom:14px}.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}.kpi{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:14px 16px}.kpi .label{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}.kpi .val{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--brass)}.kpi .hint{font-size:11px;color:var(--cream-muted);margin-top:3px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}.field input,.field select,.field textarea{width:100%}
.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}.btn:hover{border-color:var(--amber);color:var(--amber)}.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}.btn.brass:hover{background:var(--amber)}.btn.sm{padding:4px 9px;font-size:11px}.btn.ghost{border-color:var(--line);color:var(--cream-dim)}.btn.danger:hover{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:top}th{color:var(--brass);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}td.num{text-align:right;font-family:var(--mono);font-size:12px}th.num{text-align:right}
.pill{display:inline-block;padding:2px 7px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--brass);color:var(--brass)}.pill.green{border-color:var(--green);color:var(--green)}.pill.red{border-color:var(--red);color:var(--red)}.pill.amber{border-color:var(--amber);color:var(--amber)}.pill.blue{border-color:var(--blue);color:var(--blue)}
.empty{padding:24px;text-align:center;color:var(--cream-muted);font-style:italic;font-size:12px}
.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}.msg{padding:10px 14px;border-radius:6px;max-width:88%;font-size:13px;line-height:1.55;white-space:pre-wrap}.msg.user{background:var(--ink);align-self:flex-end}.msg.bot{background:var(--void-2);border:1px solid var(--line);border-left:2px solid var(--brass);align-self:flex-start}.msg .src{font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}.chat-input{display:flex;gap:8px;margin-top:10px}.chat-input input{flex:1;padding:11px 14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}.modal-bg.open{display:flex}.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:4px;padding:22px;max-width:700px;width:100%;max-height:90vh;overflow:auto}.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){nav.tabs button{padding:0 10px;font-size:11px}main{padding:14px 14px 50px}.row{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="brand"><div class="mark">◊</div><div><div class="name">FallRecruitPractice</div></div><div class="seal">v1 · prime 997</div></div>
  <nav class="tabs" id="tabNav"></nav>
  <div class="tools-r"><button class="tool-btn" id="tierBadge" onclick="openModal('settings')">T0</button><button class="tool-btn" onclick="openModal('settings')">⚙</button></div>
</header>
<main id="view"></main>
</div>
<div class="modal-bg" id="modal"><div class="modal"><h2 id="modalTitle">.</h2><div id="modalBody"></div></div></div>
<div class="toast" id="toast">.</div>

<script>
'use strict';
const TOOLNAME='fallrecruitpractice',VERSION='1.0.0',PRIME=997,STORE='fallrecruitpractice-v1';
const TABS=[{id:'dashboard',label:'dashboard'},{id:'placements',label:'placements'},{id:'permFees',label:'perm fees'},{id:'tempMargin',label:'temp margin'},{id:'invoices',label:'invoices'},{id:'consultants',label:'consultants'},{id:'expenses',label:'expenses'},{id:'pnl',label:'agency P&L'},{id:'qa',label:'Q&A'}];

const RULES={awrWeeks:12,defaultPaymentDays:30,vatRate:0.20,defaultPermFeePercent:20,rebate4wk:100,rebate8wk:75,rebate12wk:50};

let state={active:'dashboard',firm:null,placements:[],permFees:[],tempEntries:[],invoices:[],consultants:[],expenses:[],audit:[],
  ui:{chat:[]},settings:{anthropicKey:'',auditChain:true}};

const $=(s,p=document)=>p.querySelector(s);const uid=p=>(p||'')+'_'+Math.random().toString(36).slice(2,11);const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>{const v=Number(n);return isNaN(v)?'—':'£'+v.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})};
const pct=(n,d)=>d?((n/d)*100).toFixed(1)+'%':'—';
const dateStr=ts=>{if(!ts)return '—';return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;['state','audit','firms','placements','permFees','tempEntries','invoices','consultants','expenses'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'})})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
function idbGetAll(s){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(s,k){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(s,v,k){return new Promise(res=>{const tx=db.transaction(s,'readwrite');const o=tx.objectStore(s);const q=k!=null?o.put(v,k):o.put(v);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}
async function loadAll(){if(!db)await openDB();const[firms,plc,pf,te,inv,con,exp,auditArr,uiState]=await Promise.all([idbGetAll('firms'),idbGetAll('placements'),idbGetAll('permFees'),idbGetAll('tempEntries'),idbGetAll('invoices'),idbGetAll('consultants'),idbGetAll('expenses'),idbGetAll('audit'),idbGet('state','ui')]);state.firm=firms[0]||null;state.placements=plc;state.permFees=pf;state.tempEntries=te;state.invoices=inv;state.consultants=con;state.expenses=exp;state.audit=auditArr.sort((a,b)=>a.i-b.i);if(uiState){state.ui=Object.assign({},state.ui,uiState.value||{});state.settings=Object.assign({},state.settings,uiState.settings||{})}}
async function persistUI(){await idbPut('state',{value:{...state.ui},settings:state.settings},'ui')}
async function auditLog(action,opts={}){if(!state.settings.auditChain)return;const prev=state.audit.length?state.audit[state.audit.length-1]:null;const i=(prev?prev.i:0)+1;const entry={id:uid('au'),i,ts:now(),tool:TOOLNAME,action,reasoning:opts.reasoning||'',configVersion:TOOLNAME+'@'+VERSION,prevHash:prev?.docHash||'',docHash:'',payload:opts.payload||{}};entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,prevHash:entry.prevHash,payload:entry.payload}));state.audit.push(entry);await idbPut('audit',entry)}

let bcRecruit,bcSignal;
function initMesh(){try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()})}catch(e){}try{bcRecruit=new BroadcastChannel('fall-recruit');bcRecruit.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME})}catch(e){}}

function totalPermFees(){return state.permFees.reduce((s,f)=>s+Number(f.fee||0),0)}
function totalTempMargin(){return state.tempEntries.reduce((s,t)=>s+Number(t.margin||0),0)}
function totalRevenue(){return totalPermFees()+totalTempMargin()}
function totalInvoiced(){return state.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+Number(i.amount||0),0)}
function totalOutstanding(){return state.invoices.filter(i=>i.status==='sent').reduce((s,i)=>s+Number(i.amount||0),0)}
function totalExpenses(){return state.expenses.reduce((s,e)=>s+Number(e.amount||0),0)}
function activePlacements(){return state.placements.filter(p=>p.status==='active').length}
function awrAlerts(){return state.placements.filter(p=>{if(p.type!=='temporary'&&p.type!=='contract')return false;if(p.status!=='active'||!p.startDate)return false;const w=Math.floor((now()-new Date(p.startDate).getTime())/(7*24*60*60*1000));return w>=RULES.awrWeeks-2}).length}
function monthlyData(arr,amtKey){const m={};arr.forEach(r=>{const k=new Date(r.date||r.ts).toISOString().slice(0,7);m[k]=(m[k]||0)+Number(r[amtKey]||0)});return m}

function render(){$('#tabNav').innerHTML=TABS.map(t=>`<button class="${state.active===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');const v=$('#view');switch(state.active){case 'dashboard':return renderDashboard(v);case 'placements':return renderPlacements(v);case 'permFees':return renderPermFees(v);case 'tempMargin':return renderTempMargin(v);case 'invoices':return renderInvoices(v);case 'consultants':return renderConsultants(v);case 'expenses':return renderExpenses(v);case 'pnl':return renderPnL(v);case 'qa':return renderQA(v)}}
function switchTab(id){state.active=id;persistUI();render()}

function renderDashboard(v){const tRev=totalRevenue();const tExp=totalExpenses();const net=tRev-tExp;
  v.innerHTML=`<div class="disclaimer"><strong>◊ Regulatory notice:</strong> FallRecruitPractice tracks agency finances per Employment Agencies Act 1973, Conduct Regulations 2003, and HMRC requirements. All business decisions remain the agency principal's responsibility. Data never leaves this device.</div><div class="section-h"><h2>Dashboard</h2><div class="sub">${state.firm?.name||'set up agency'}</div></div><div class="kpi-grid"><div class="kpi"><div class="label">Perm fees</div><div class="val">${fmt(totalPermFees())}</div></div><div class="kpi"><div class="label">Temp margin</div><div class="val">${fmt(totalTempMargin())}</div></div><div class="kpi"><div class="label">Total revenue</div><div class="val">${fmt(tRev)}</div></div><div class="kpi"><div class="label">Outstanding</div><div class="val" style="color:${totalOutstanding()>0?'var(--amber)':'var(--green)'};">${fmt(totalOutstanding())}</div></div><div class="kpi"><div class="label">Active placements</div><div class="val">${activePlacements()}</div></div><div class="kpi"><div class="label">AWR alerts</div><div class="val" style="color:${awrAlerts()>0?'var(--red)':'var(--green)'};">${awrAlerts()}</div><div class="hint">within 2 weeks of ${RULES.awrWeeks}-wk</div></div><div class="kpi"><div class="label">Expenses</div><div class="val">${fmt(tExp)}</div></div><div class="kpi"><div class="label">Net</div><div class="val" style="color:${net>=0?'var(--green)':'var(--red)'};">${fmt(net)}</div></div></div>`}

function renderPlacements(v){v.innerHTML=`<div class="section-h"><h2>Placements</h2><div class="sub">${activePlacements()} active / ${state.placements.length} total</div><div class="actions"><button class="btn brass sm" onclick="openModal('addPlacement')">+ Placement</button></div></div>${state.placements.length?`<table><thead><tr><th>Candidate</th><th>Client</th><th>Role</th><th>Type</th><th>Start</th><th>Status</th><th>AWR wk</th><th>Consultant</th></tr></thead><tbody>${state.placements.sort((a,b)=>(b.ts||0)-(a.ts||0)).map(p=>{let awrWk='—';if((p.type==='temporary'||p.type==='contract')&&p.startDate&&p.status==='active'){const w=Math.floor((now()-new Date(p.startDate).getTime())/(7*24*60*60*1000));awrWk=w>=RULES.awrWeeks?`<span style="color:var(--red);font-weight:700">${w} ⚠</span>`:w}return `<tr><td>${esc(p.candidate)}</td><td>${esc(p.client)}</td><td>${esc(p.role)}</td><td><span class="pill ${p.type==='permanent'?'blue':'amber'}">${p.type}</span></td><td>${esc(p.startDate)}</td><td><span class="pill ${p.status==='active'?'green':p.status==='completed'?'blue':'red'}">${p.status}</span></td><td>${awrWk}</td><td>${esc(p.consultant)}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">No placements.</div>'}`}

function renderPermFees(v){v.innerHTML=`<div class="section-h"><h2>Permanent Fees</h2><div class="sub">${fmt(totalPermFees())}</div><div class="actions"><button class="btn brass sm" onclick="openModal('addPermFee')">+ Fee</button></div></div>${state.permFees.length?`<table><thead><tr><th>Date</th><th>Candidate</th><th>Client</th><th>Salary</th><th>Fee %</th><th class="num">Fee £</th><th>Consultant</th><th>Rebate status</th></tr></thead><tbody>${state.permFees.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(f=>`<tr><td>${esc(f.date)}</td><td>${esc(f.candidate)}</td><td>${esc(f.client)}</td><td class="num">${fmt(f.salary)}</td><td class="num">${f.feePercent}%</td><td class="num">${fmt(f.fee)}</td><td>${esc(f.consultant)}</td><td><span class="pill ${f.rebateStatus==='clear'?'green':f.rebateStatus==='in guarantee'?'amber':'red'}">${f.rebateStatus||'—'}</span></td></tr>`).join('')}</tbody></table>`:'<div class="empty">No permanent fees.</div>'}`}

function renderTempMargin(v){v.innerHTML=`<div class="section-h"><h2>Temp Margin</h2><div class="sub">${fmt(totalTempMargin())}</div><div class="actions"><button class="btn brass sm" onclick="openModal('addTempEntry')">+ Entry</button></div></div>${state.tempEntries.length?`<table><thead><tr><th>Week ending</th><th>Candidate</th><th>Client</th><th>Hours</th><th class="num">Charge rate</th><th class="num">Pay rate</th><th class="num">Margin</th><th>AWR wk</th></tr></thead><tbody>${state.tempEntries.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(t=>`<tr><td>${esc(t.date)}</td><td>${esc(t.candidate)}</td><td>${esc(t.client)}</td><td class="num">${t.hours}</td><td class="num">${fmt(t.chargeRate)}/hr</td><td class="num">${fmt(t.payRate)}/hr</td><td class="num">${fmt(t.margin)}</td><td class="num">${t.awrWeek||'—'}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No temp margin entries.</div>'}`}

function renderInvoices(v){v.innerHTML=`<div class="section-h"><h2>Invoices</h2><div class="sub">${fmt(totalOutstanding())} outstanding</div><div class="actions"><button class="btn brass sm" onclick="openModal('addInvoice')">+ Invoice</button></div></div>${state.invoices.length?`<table><thead><tr><th>Date</th><th>Invoice no</th><th>Client</th><th>Description</th><th class="num">Amount</th><th>Status</th><th>Due</th></tr></thead><tbody>${state.invoices.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(i=>`<tr><td>${esc(i.date)}</td><td style="font-family:var(--mono);font-size:11px">${esc(i.invoiceNo)}</td><td>${esc(i.client)}</td><td>${esc(i.description)}</td><td class="num">${fmt(i.amount)}</td><td><span class="pill ${i.status==='paid'?'green':i.status==='sent'?'amber':'red'}">${i.status}</span></td><td>${esc(i.dueDate)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No invoices.</div>'}`}

function renderPnL(v){const mPerm=monthlyData(state.permFees,'fee');const mTemp=monthlyData(state.tempEntries,'margin');const mExp=monthlyData(state.expenses,'amount');const allMonths=[...new Set([...Object.keys(mPerm),...Object.keys(mTemp),...Object.keys(mExp)])].sort().slice(-12);
  let tP=0,tT=0,tE=0;
  v.innerHTML=`<div class="section-h"><h2>Agency P&L</h2><div class="sub">rolling 12 months</div></div>${allMonths.length?`<table><thead><tr><th>Month</th><th class="num">Perm fees</th><th class="num">Temp margin</th><th class="num">Total revenue</th><th class="num">Expenses</th><th class="num">Net</th></tr></thead><tbody>${allMonths.map(m=>{const p=mPerm[m]||0;const t=mTemp[m]||0;const e=mExp[m]||0;const n=p+t-e;tP+=p;tT+=t;tE+=e;return `<tr><td>${m}</td><td class="num">${fmt(p)}</td><td class="num">${fmt(t)}</td><td class="num">${fmt(p+t)}</td><td class="num">${fmt(e)}</td><td class="num" style="color:${n>=0?'var(--green)':'var(--red)'};">${fmt(n)}</td></tr>`}).join('')}<tr style="border-top:2px solid var(--brass);font-weight:700"><td>Total</td><td class="num">${fmt(tP)}</td><td class="num">${fmt(tT)}</td><td class="num">${fmt(tP+tT)}</td><td class="num">${fmt(tE)}</td><td class="num" style="color:${(tP+tT-tE)>=0?'var(--green)':'var(--red)'};">${fmt(tP+tT-tE)}</td></tr></tbody></table>`:'<div class="empty">No data yet.</div>'}`}

const T0_QA=[
  {q:/fee|charge|perm|permanent|percentage/i,a:'Permanent placement fees: typically 15-25% of first-year gross salary. Agreed in Terms of Business before introduction. Fee becomes payable on candidate start date (or per agreed trigger). Conduct Regs 2003: fee terms must be in writing. No fee for work-seekers (EAA 1973 s.6). VAT applies to recruitment services. Invoice on start date, payment per agreed terms (typically 30 days).'},
  {q:/margin|temp|temporary|charge.?rate|pay.?rate/i,a:'Temp margin = charge rate to client minus pay rate to worker minus employer costs (NI, holiday pay, pension, apprenticeship levy). Typical gross margins: 15-30% of charge rate. Must factor in: employer NI (13.8% above threshold), holiday pay (12.07% of basic), workplace pension (3% qualifying earnings), apprenticeship levy (0.5% if payroll >£3M). AWR compliance may reduce margin after 12 weeks if pay must increase.'},
  {q:/invoice|payment|credit|debt|outstanding/i,a:'Invoice management: perm fees invoiced on start date, temp charges weekly/monthly per agreement. Standard payment terms 30 days. Conduct Regs 2003: agency must pay temp workers for work done regardless of client payment. Credit control: statement at 30 days, reminder at 45, formal demand at 60, debt recovery/legal at 90+. Interest on late payment: Late Payment of Commercial Debts (Interest) Act 1998 — Bank of England base rate + 8%.'},
  {q:/rebate|refund|guarantee|leaver/i,a:'Fee rebate: standard for permanent placements. Typical: 100% refund weeks 1-4, 75% weeks 5-8, 50% weeks 9-12. Conditions: client notifies within 7 days of departure, agency given chance to replace. No rebate for: redundancy, constructive dismissal, client materially changes role. Pro-rata calculation based on weeks served. Rebate schedule must be in written terms.'},
  {q:/awr|12.?week|agency.?worker|equal/i,a:'AWR 2010: 12 qualifying weeks = equal pay and conditions. Track weeks per placement — breaks of 6+ weeks reset (exceptions: sickness ≤28 weeks, annual leave, jury service, pregnancy ≤26 weeks). New role with same client may or may not reset depending on whether "substantively different". Agency must obtain comparable pay information from client. Margin may reduce if pay increases — plan for this commercially.'},
  {q:/commission|consultant|split|bonus/i,a:'Consultant commission: typically 10-30% of fee/margin generated. Structures: threshold-based (higher % above target), flat rate, team-based. Commission usually paid month following invoice payment (not invoice date). Clawback if rebate triggered. Employment contracts should clearly state commission terms, calculation method, and payment timing.'},
  {q:/vat|hmrc|tax|corporation/i,a:'VAT: recruitment services standard-rated at 20%. Register if taxable turnover exceeds £90,000. Flat Rate Scheme may benefit smaller agencies (typically 14.5% for labour-only, 12% for staff supply). Corporation Tax: 25% (over £250K profits), 19% small profits rate (under £50K). RTI for temp payroll: submit FPS by or before each payday, EPS by 19th.'},
  {q:/insurance|indemnity|liability/i,a:'Recruitment insurance: Professional Indemnity (PI) — covers negligent advice, mis-hire. Public Liability (PL) — injury on client premises. Employers\' Liability (EL) — mandatory for temps on agency payroll, min £5M (Employers\' Liability (Compulsory Insurance) Act 1969). Consider also: cyber liability, D&O, fidelity guarantee. REC membership includes some PI cover.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK recruitment rules'}}return null}
async function askT3(q){if(!state.settings.anthropicKey)return null;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.settings.anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK recruitment agency finance expert. Fees, margins, AWR, payroll, HMRC, Conduct Regs. Concise.\n\n'+q}]})});if(!res.ok)return null;const j=await res.json();return {answer:j.content?.[0]?.text,source:'T3 · Anthropic'}}catch(e){return null}}
function renderQA(v){v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 + T3 BYOK</div></div><div class="card" style="max-width:780px"><div class="chat" id="chatBox">${(state.ui.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div><div class="chat-input"><input id="chatIn" placeholder="Ask… 'perm fee calculation?' · 'temp margin?' · 'AWR impact on margin?'" onkeydown="if(event.key==='Enter')askQ()"><button class="btn brass" onclick="askQ()">Ask</button></div></div>`;const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight}
async function askQ(){const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';if(!state.ui.chat)state.ui.chat=[];state.ui.chat.push({role:'user',text:q});render();let r=askT0(q);if(!r)r=await askT3(q);state.ui.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match. Add BYOK key for T3.',source:'system'});persistUI();render()}

async function addPlacement(){const p={id:uid('pl'),candidate:$('#pCand').value.trim(),client:$('#pClient').value.trim(),role:$('#pRole').value.trim(),type:$('#pType').value,startDate:$('#pStart').value,status:$('#pStatus').value,consultant:$('#pCon').value.trim(),ts:now()};state.placements.push(p);await idbPut('placements',p);await auditLog('placement.added',{payload:{id:p.id}});closeModal();toast('Added');render()}

async function addInvoice(){const i={id:uid('in'),date:$('#invDate').value,invoiceNo:$('#invNo').value.trim(),client:$('#invClient').value.trim(),description:$('#invDesc').value.trim(),amount:Number($('#invAmt').value||0),dueDate:$('#invDue').value,status:$('#invStatus').value,ts:now()};state.invoices.push(i);await idbPut('invoices',i);await auditLog('invoice.added',{payload:{id:i.id}});closeModal();toast('Added');render()}

async function addExpense(){const e={id:uid('ex'),date:$('#eDate').value,category:$('#eCat').value,description:$('#eDesc').value.trim(),supplier:$('#eSupp').value.trim(),amount:Number($('#eAmt').value||0),ts:now()};state.expenses.push(e);await idbPut('expenses',e);await auditLog('expense.added',{payload:{id:e.id}});closeModal();toast('Added');render()}
async function saveSettings(){const f=state.firm||{id:uid('fi'),ts:now()};f.name=$('#fName').value.trim();f.companyNo=$('#fCoNo').value.trim();f.address=$('#fAddr').value.trim();f.phone=$('#fPhone').value.trim();f.email=$('#fEmail').value.trim();f.updatedAt=now();state.firm=f;await idbPut('firms',f);state.settings.anthropicKey=$('#sKey').value.trim();state.settings.auditChain=$('#sAudit').checked;$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';await persistUI();closeModal();toast('Saved');render()}
function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),firm:state.firm,placements:state.placements,permFees:state.permFees,tempEntries:state.tempEntries,invoices:state.invoices,consultants:state.consultants,expenses:state.expenses};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallrecruitpractice-export.json';a.click();URL.revokeObjectURL(u);toast('Exported')}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.firm){state.firm=d.firm;await idbPut('firms',d.firm)}for(const k of['placements','permFees','tempEntries','invoices','consultants','expenses']){if(Array.isArray(d[k]))for(const r of d[k]){state[k].push(r);await idbPut(k,r)}}persistUI();toast('Imported');render()}catch(e){toast('Failed')}};inp.click()}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;for(const s of['firms','placements','permFees','tempEntries','invoices','consultants','expenses','audit','state']){const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r})}location.reload()}
